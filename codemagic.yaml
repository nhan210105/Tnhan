workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      xcode: latest

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Build app
        script: |
          xcodebuild \
          -project TapGame.xcodeproj \
          -scheme TapGame \
          -sdk iphoneos \
          build

    artifacts:
      - build/**/*.app
